<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
      (() => {
        const storageKey = 'pulse-theme';
        const themeClasses = ['dark', 'theme-midnight'];

        try {
          const storedTheme = window.localStorage.getItem(storageKey);
          const hasStoredTheme = ['light', 'dark', 'midnight'].includes(storedTheme);
          const prefersDark =
            typeof window.matchMedia === 'function' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          const prefersLight =
            typeof window.matchMedia === 'function' &&
            window.matchMedia('(prefers-color-scheme: light)').matches;
          const theme = hasStoredTheme
            ? storedTheme
            : prefersDark
              ? 'dark'
              : prefersLight
                ? 'light'
                : 'dark';

          document.documentElement.classList.remove(...themeClasses);

          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else if (theme === 'midnight') {
            document.documentElement.classList.add('theme-midnight');
          }
        } catch {
          document.documentElement.classList.remove(...themeClasses);
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

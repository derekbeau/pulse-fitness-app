services:
  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=/data/pulse.db
      - AGENT_TOKEN_CLAUDE_CODE=${AGENT_TOKEN_CLAUDE_CODE}
    volumes:
      - pulse-data:/data

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    ports:
      - '8147:80'
    depends_on:
      - api

volumes:
  pulse-data:
